name: Deploy to AWS ECS

# รันเมื่อ push ขึ้น branch main
on:
  push:
    branches: [main]

# ==========================================
# Environment Variables — แก้ค่าเหล่านี้ให้ตรงกับ AWS ของคุณ
# ==========================================
env:
  AWS_REGION:      ap-southeast-1
  ECR_REPOSITORY:  hello-world-app       # ← ชื่อ ECR repository
  ECS_CLUSTER:     hello-world-cluster   # ← ชื่อ ECS cluster
  ECS_SERVICE:     hello-world-task-service-kzs978f4   # ← ชื่อ ECS service
  CONTAINER_NAME:  hello-world-app       # ← ชื่อ container ใน Task Definition

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout โค้ดจาก GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: ตั้งค่า AWS credentials (อ่านจาก GitHub Secrets)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # Step 3: Login เข้า ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build Docker image แล้ว Push ขึ้น ECR
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          # --platform linux/amd64 สำคัญมาก! (Mac M-series เป็น ARM64 แต่ ECS ต้องการ AMD64)
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push .

      # Step 5: Force ECS ให้ deploy version ใหม่
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service  $ECS_SERVICE \
            --force-new-deployment

      # Step 6: รอจนกว่า deploy เสร็จ (stable)
      - name: Wait for deployment to complete
        run: |
          echo "⏳ รอ deployment เสร็จ..."
          aws ecs wait services-stable \
            --cluster  $ECS_CLUSTER \
            --services $ECS_SERVICE
          echo "✅ Deploy สำเร็จ!"
